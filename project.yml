name: RPS
options:
  bundleIdPrefix: com.arbatskiy
  deploymentTarget:
    iOS: "16.0"
  xcodeVersion: "16.0"
  defaultConfig: Debug

configs:
  Debug: debug
  Release: release

targets:
  RPS:
    type: application
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - path: App
      - path: Views
      - path: GameEngine
      - path: Network
      - path: DeviceManagers
    resources:
      - path: Assets.xcassets
      - path: Sounds
    info:
      path: Info.plist
      properties:
        UILaunchScreen: {}
        NSLocalNetworkUsageDescription: "Used to connect with nearby players"
        NSBonjourServices:
          - "_rps-game._tcp"
          - "_rps-game._udp"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.arbatskiy.rps
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: 1
        SWIFT_VERSION: "5.9"
        IPHONEOS_DEPLOYMENT_TARGET: "16.0"
        TARGETED_DEVICE_FAMILY: "1"
        REQUIRES_FULL_SCREEN: YES
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: HXUSK3HF54

schemes:
  RPS:
    build:
      targets:
        RPS: all
    run:
      config: Debug
    test:
      config: Debug
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
